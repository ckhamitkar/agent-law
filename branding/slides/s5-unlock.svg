<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1280" height="720" fill="#FAFAF8"/>
  <text x="80" y="92" font-size="20" letter-spacing="3" fill="#1E6E6A">THE UNLOCK</text>
  <text x="80" y="156" font-size="52" font-weight="700" fill="#23231F">Governance is the banks, not the wall.</text>
  <text x="80" y="210" font-size="27" font-style="italic" fill="#55554E">A river without banks is a swamp. With banks, it has force.</text>

  <!-- five waves -->
  <g font-size="22" text-anchor="middle">
    <rect x="80"  y="300" width="190" height="78" rx="12" fill="#EFEFEA" stroke="#CFCFC8" stroke-width="2"/>
    <text x="175" y="346" fill="#55554E">data</text>
    <rect x="300" y="300" width="190" height="78" rx="12" fill="#EFEFEA" stroke="#CFCFC8" stroke-width="2"/>
    <text x="395" y="346" fill="#55554E">services</text>
    <rect x="520" y="300" width="190" height="78" rx="12" fill="#EFEFEA" stroke="#CFCFC8" stroke-width="2"/>
    <text x="615" y="346" fill="#55554E">identities</text>
    <rect x="740" y="300" width="190" height="78" rx="12" fill="#EFEFEA" stroke="#CFCFC8" stroke-width="2"/>
    <text x="835" y="346" fill="#55554E">workloads</text>
    <rect x="960" y="288" width="240" height="102" rx="14" fill="#1E6E6A" stroke="#13504C" stroke-width="2"/>
    <text x="1080" y="332" fill="#FFFFFF" font-weight="700" font-size="26">agents</text>
    <text x="1080" y="362" fill="#BFE3E0" font-size="15">the fifth wave</text>
  </g>
  <g fill="#C9C9C2" font-size="26">
    <text x="285" y="348">&#8594;</text>
    <text x="505" y="348">&#8594;</text>
    <text x="725" y="348">&#8594;</text>
    <text x="945" y="348">&#8594;</text>
  </g>

  <text x="80" y="492" font-size="28" fill="#23231F">The blocker was never <tspan font-style="italic">capability</tspan>. It was <tspan font-weight="700" fill="#1E6E6A">governability</tspan>.</text>
  <text x="80" y="540" font-size="28" fill="#23231F">Channel it &#8212; and the agent does wonders.</text>

  <line x1="80" y1="600" x2="1200" y2="600" stroke="#E0E0DA" stroke-width="2"/>
  <text x="80" y="648" font-size="20" fill="#8A8A80">Whoever makes agents <tspan font-style="italic">governable</tspan> is who makes agents <tspan font-style="italic">productive</tspan>.</text>
  <text x="1200" y="694" text-anchor="end" font-size="16" letter-spacing="1" fill="#9A9A90">&#9875;&#160;&#160;agent law&#160;&#160;·&#160;&#160;5</text>
</svg>
