<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1280" height="720" fill="#FAFAF8"/>
  <text x="80" y="92" font-size="20" letter-spacing="3" fill="#1E6E6A">THE PATTERN</text>
  <text x="80" y="150" font-size="50" font-weight="700" fill="#23231F">EA has done this four times.</text>

  <!-- column headers -->
  <text x="80"  y="232" font-size="17" letter-spacing="1" fill="#A8A89E">THE NEW ENTITY</text>
  <text x="520" y="232" font-size="17" letter-spacing="1" fill="#A8A89E">THE GOVERNANCE OBJECT</text>
  <text x="980" y="232" font-size="17" letter-spacing="1" fill="#A8A89E">THE UNLOCK</text>
  <line x1="80" y1="252" x2="1200" y2="252" stroke="#E0E0DA" stroke-width="2"/>

  <!-- rows -->
  <g font-size="26" fill="#23231F">
    <text x="80" y="312" font-weight="700">Raw data</text>
    <text x="520" y="312" fill="#55554E">stewardship &amp; lineage</text>
    <text x="980" y="312" fill="#1E6E6A">analytics, ML</text>

    <text x="80" y="384" font-weight="700">Integration</text>
    <text x="520" y="384" fill="#55554E">the service contract</text>
    <text x="980" y="384" fill="#1E6E6A">the API economy</text>

    <text x="80" y="456" font-weight="700">Identities</text>
    <text x="520" y="456" fill="#55554E">IAM, least privilege</text>
    <text x="980" y="456" fill="#1E6E6A">safe scale, Zero Trust</text>

    <text x="80" y="528" font-weight="700">Workloads</text>
    <text x="520" y="528" fill="#55554E">policy, IaC, the pod</text>
    <text x="980" y="528" fill="#1E6E6A">elastic cloud</text>
  </g>
  <line x1="80" y1="276" x2="1200" y2="276" stroke="#F0F0EB"/>
  <line x1="80" y1="348" x2="1200" y2="348" stroke="#F0F0EB"/>
  <line x1="80" y1="420" x2="1200" y2="420" stroke="#F0F0EB"/>
  <line x1="80" y1="492" x2="1200" y2="492" stroke="#F0F0EB"/>

  <text x="80" y="624" font-size="26" font-style="italic" fill="#55554E">Each time, the governance everyone feared as overhead was the <tspan fill="#1E6E6A" font-style="normal" font-weight="700">unlock</tspan>.</text>
  <text x="1200" y="680" text-anchor="end" font-size="16" letter-spacing="1" fill="#9A9A90">&#9875;&#160;&#160;agent law&#160;&#160;·&#160;&#160;2</text>
</svg>
