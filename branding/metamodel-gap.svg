<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- RAW MOCK for Anjali to polish. Concept: the metamodel already holds the act; what it has never held is the answer. -->
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E6E6A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="#FAFAF8"/>

  <!-- Title -->
  <text x="600" y="78" text-anchor="middle" font-size="40" font-weight="700" fill="#23231F">EA models the act. Not the answer.</text>
  <text x="600" y="116" text-anchor="middle" font-size="21" fill="#6A6A62">The metamodel already holds an agent that acts. It has never held one that answers.</text>

  <!-- what the metamodel ALREADY holds (concede) -->
  <text x="84" y="188" font-size="17" letter-spacing="2" fill="#8A8A80">WHAT THE METAMODEL ALREADY HOLDS</text>
  <rect x="80" y="206" width="1040" height="232" rx="14" fill="#EFEFEA" stroke="#CFCFC8" stroke-width="2"/>
  <text x="118" y="262" font-size="30" font-weight="700" fill="#23231F">ACTIVE STRUCTURE</text>
  <text x="118" y="298" font-size="20" fill="#55554E">one aspect, across layers &#8212; the subjects that perform behavior</text>

  <rect x="118" y="326" width="300" height="78" rx="12" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1.5"/>
  <text x="268" y="362" text-anchor="middle" font-size="20" font-weight="600" fill="#23231F">BUSINESS ACTOR</text>
  <text x="268" y="388" text-anchor="middle" font-size="14" fill="#9A9A90">acts</text>

  <rect x="442" y="326" width="360" height="78" rx="12" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1.5"/>
  <text x="622" y="362" text-anchor="middle" font-size="20" font-weight="600" fill="#23231F">APPLICATION COMPONENT</text>
  <text x="622" y="388" text-anchor="middle" font-size="14" fill="#9A9A90">acts &#183; bound by an assignment relationship</text>

  <rect x="826" y="338" width="272" height="54" rx="27" fill="#1E6E6A" filter="url(#soft)"/>
  <text x="962" y="371" text-anchor="middle" font-size="16" fill="#FFFFFF">&#9650;&#160;&#160;AI AGENT fits here &#8212; natively</text>

  <!-- what it has NEVER held (the real gap) -->
  <text x="84" y="500" font-size="17" letter-spacing="2" fill="#B06A3A">WHAT IT HAS NEVER HELD &#8212; FOR ANY ACTOR</text>
  <rect x="80" y="518" width="1040" height="232" rx="14" fill="#FBF6F1" stroke="#D9A878" stroke-width="2" stroke-dasharray="11 9"/>
  <text x="118" y="582" font-size="30" font-weight="700" fill="#9A5A2C">LEGAL ANSWERABILITY</text>
  <text x="118" y="624" font-size="21" fill="#7A5A3E">who is liable when the act causes harm?</text>
  <text x="118" y="664" font-size="17" fill="#A07A55">EA &#8220;responsibility&#8221; = who does the work &#8212; never who answers for it.</text>
  <text x="118" y="700" font-size="16" font-style="italic" fill="#B58A60">the discretion of an agent and the answerability of a hammer.</text>
  <text x="1082" y="600" text-anchor="end" font-size="74" font-weight="700" fill="#E7CBAE">&#8709;</text>
  <text x="1082" y="636" text-anchor="end" font-size="15" letter-spacing="1" fill="#C39A6E">no object</text>

  <!-- caption -->
  <text x="600" y="812" text-anchor="middle" font-size="22" fill="#55554E">The gap was never actor-vs-component. It&#8217;s that nothing names <tspan font-style="italic">who answers</tspan> for the harm.</text>

  <!-- footer signature -->
  <text x="1120" y="868" text-anchor="end" font-size="15" letter-spacing="1" fill="#9A9A90">&#9875;&#160;&#160;agent law</text>
</svg>
